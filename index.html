<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>H&P Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/html5-qrcode.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PANTALLA LOGIN -->
  <div id="screen-auth" class="screen">
    <div class="setup-wrap">
      <div class="auth-logo">H&P Portal</div>
      <div style="background:white; padding:30px; border-radius:32px; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
        <form id="form-auth" onsubmit="handleAuth(event)">
          <input type="text" id="auth-user" class="auth-input" placeholder="Usuario" required>
          <input type="password" id="auth-pass" class="auth-input" placeholder="Contraseña" required>
          <button type="submit" class="btn-main">Acceder</button>
        </form>
      </div>
    </div>
  </div>

  <!-- PANTALLA CONFIGURACIÓN -->
  <div id="screen-setup" class="screen">
    <div class="setup-wrap">
      <div class="user-card">
        <div class="user-name" id="display-name">Hola</div>
        <button onclick="logout()" style="background:#e5e5ea; border:none; width:44px; height:44px; border-radius:50%; font-weight:bold; cursor:pointer;">✕</button>
      </div>

      <div>
        <label class="section-label">Marcas</label>
        <div class="selector-group">
          <button class="btn-select brand-btn" data-brand="Huss" onclick="selectBrand(this)">
            <span>🦎</span> Hussongs
          </button>
          <button class="btn-select brand-btn" data-brand="Papas" onclick="selectBrand(this)">
            <span>🍟🍺</span> Papas & Beer
          </button>
        </div>
      </div>

      <div>
        <label class="section-label">Actividad</label>
        <div class="selector-group">
          <button class="btn-select mode-btn" data-mode="inventario" onclick="selectMode(this)">
            <span>📦</span> Inventario
          </button>
          <button class="btn-select mode-btn" data-mode="pedido" onclick="selectMode(this)">
            <span>📋</span> Pedidos
          </button>
        </div>
      </div>

      <div style="position:relative;">
        <label class="section-label">Tienda de entrega</label>
        <button class="drop-trigger" onclick="toggleDropdown()">
          <span id="dropdown-label">Seleccionar...</span>
          <span>▼</span>
        </button>
        <div class="drop-list" id="dropdown-menu"></div>
      </div>

      <button id="btn-start" class="btn-main" onclick="handleStart()" disabled>Comenzar →</button>
    </div>
  </div>

  <!-- PANTALLA INVENTARIO -->
  <div id="screen-scanner" class="screen">
    <div class="setup-wrap">
      <div class="user-name" id="meta-loc">Ubicación</div>
      <div class="scan-hero" style="background:#fff; padding:25px; border-radius:24px; box-shadow:0 4px 15px rgba(0,0,0,0.02); display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <div class="section-label" style="margin:0;">Escaneados</div>
        <div id="counter-num" style="font-size:48px; font-weight:900;">0</div>
      </div>
      
      <div class="scanner-container-wrapper">
        <div id="qr-reader"></div>
      </div>

      <div style="background:white; padding:20px; border-radius:20px; box-shadow:0 4px 10px rgba(0,0,0,0.02);">
        <div id="lsb-name" style="font-weight:700;">Esperando...</div>
        <div id="lsb-code" style="color:#8e8e93; font-family:monospace; margin-top:5px; font-size:14px;">----------</div>
      </div>
    </div>
    
    <div class="footer-nav">
      <button class="nav-btn btn-sec" onclick="showModal('modal-manual')">Manual</button>
      <button class="nav-btn btn-red" onclick="endSession()">Salir</button>
    </div>
  </div>

  <!-- PANTALLA PEDIDO -->
  <div id="screen-pedido" class="screen">
    <div class="setup-wrap">
      <div class="user-name" id="pedido-title">Pedido</div>
      <div style="height:10px; background:#e5e5ea; border-radius:10px; overflow:hidden; margin-bottom:15px;">
        <div id="pedido-progress-fill" style="height:100%; background:#007aff; width:0%; transition:0.5s;"></div>
      </div>
      <div class="pedido-list" id="pedido-list"></div>
    </div>

    <div class="footer-nav">
      <button class="nav-btn btn-main" style="flex:2" onclick="openPedidoScanner()">📸 Escanear</button>
      <button class="nav-btn btn-main" style="background:#8e8e93" onclick="showModal('modal-manual')">⌨️</button>
      <button class="nav-btn btn-red" onclick="endSession()">Salir</button>
    </div>
  </div>

  <!-- OVERLAY ESCANEO PEDIDO (FULL SCREEN) -->
  <div id="pedido-scanner-overlay" class="screen">
    <div style="height:100%; display:flex; flex-direction:column;">
        <div id="qr-reader-pedido" style="flex:1;"></div>
        <div id="pedido-scan-result" style="padding:30px; text-align:center; font-weight:800; font-size:22px; background:white; color:black;">Manten el código frente a la cámara</div>
        <button onclick="closePedidoScanner()" class="btn-main" style="border-radius:0; height:80px; font-size:18px;">Cerrar Scanner</button>
    </div>
  </div>

  <!-- MODAL MANUAL -->
  <div id="modal-manual" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); z-index:9000; align-items:center; justify-content:center; padding:20px;">
    <div style="background:white; padding:35px; border-radius:32px; width:100%; max-width:360px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.3);">
      <h3 style="margin-bottom:20px; font-size:20px;">Entrada Manual</h3>
      <input type="number" id="manual-code" class="auth-input" style="text-align:center; font-size:24px; border:2px solid #e5e5ea;" placeholder="Código">
      <div style="display:flex; gap:10px; margin-top:20px;">
          <button onclick="hideModal('modal-manual')" class="btn-main" style="background:#e5e5ea; color:#000;">Cancelar</button>
          <button class="btn-main" onclick="submitManual()">Registrar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
