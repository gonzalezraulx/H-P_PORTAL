<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Ionicons for modern icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="top-bar">
            <h1 id="page-title">Scan</h1>
            <div class="header-actions">
                <ion-icon name="image-outline"></ion-icon>
                <ion-icon name="flash-outline" id="flash-toggle"></ion-icon>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="content-area">
            
            <!-- Scan View -->
            <section id="view-scan" class="view active">
                <div class="scanner-wrapper">
                    <!-- The div where the camera stream will be injected -->
                    <div id="reader"></div>
                    <!-- Custom Viewfinder Overlay -->
                    <div class="viewfinder-overlay">
                        <div class="corner top-left"></div>
                        <div class="corner top-right"></div>
                        <div class="corner bottom-left"></div>
                        <div class="corner bottom-right"></div>
                        <div class="scan-line"></div>
                    </div>
                    <div class="instruction-toast">
                        Point the camera to the QR or Barcode code to scan it
                    </div>
                </div>
                
                <div class="scan-actions">
                    <button id="btn-start-scan" class="primary-btn">Start Scanning</button>
                    <button id="btn-stop-scan" class="secondary-btn hidden">Stop</button>
                </div>
            </section>

            <!-- History View (Last) -->
            <section id="view-last" class="view">
                <div class="history-container">
                    <h2>Recent Scans</h2>
                    <ul id="history-list">
                        <!-- History items will be injected here via JS -->
                        <div class="empty-state">No recent scans.</div>
                    </ul>
                </div>
            </section>

        </main>

        <!-- Result Modal Overlay -->
        <div id="result-modal" class="modal hidden">
            <div class="modal-content glass">
                <h3>Scan Successful</h3>
                <p id="scanned-result-text" class="result-text"></p>
                <div class="modal-actions">
                    <button id="btn-copy" class="secondary-btn"><ion-icon name="copy-outline"></ion-icon> Copy</button>
                    <button id="btn-close-modal" class="primary-btn">Continue</button>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="view-scan">
                <ion-icon name="qr-code-outline"></ion-icon>
                <span>Scan</span>
            </button>
            <button class="nav-item" data-target="view-last">
                <ion-icon name="time-outline"></ion-icon>
                <span>Last</span>
            </button>
            <button class="nav-item">
                <ion-icon name="settings-outline"></ion-icon>
                <span>Settings</span>
            </button>
        </nav>
    </div>

    <!-- HTML5-QRCode Library via CDN -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="app.js"></script>
</body>
</html>
