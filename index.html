<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H&P Portal</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- html5-qrcode library -->
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/html5-qrcode.min.js"></script>
</head>
<body>

    <!-- SCREEN: AUTH (LOGIN) -->
    <div id="screen-auth" class="screen">
        <div class="auth-container">
            <div class="logo">H&P Portal</div>
            <form id="auth-form" onsubmit="handleAuth(event)">
                <input type="text" id="auth-user" placeholder="Usuario" required autocomplete="username">
                <input type="password" id="auth-pass" placeholder="Contraseña" required autocomplete="current-password">
                <button type="submit" class="btn-primary">Acceder</button>
            </form>
        </div>
    </div>

    <!-- SCREEN: SETUP (MARCA / MODO / TIENDA) -->
    <div id="screen-setup" class="screen">
        <div class="header">
            <span id="display-name">Hola</span>
            <button onclick="logout()" class="btn-text">Salir</button>
        </div>

        <div class="content">
            <h3>Paso 1: Marca</h3>
            <div class="grid-2">
                <button class="brand-btn" data-brand="Huss" onclick="selectBrand(this)">
                    <div class="brand-name">Hussongs</div>
                </button>
                <button class="brand-btn" data-brand="Papas" onclick="selectBrand(this)">
                    <div class="brand-name">Papas</div>
                </button>
            </div>

            <h3>Paso 2: Modo</h3>
            <div class="grid-2">
                <button class="mode-btn" data-mode="inventario" onclick="selectMode(this)">Inventario</button>
                <button class="mode-btn" data-mode="pedidos" onclick="selectMode(this)">Pedidos</button>
            </div>

            <h3>Paso 3: Destino</h3>
            <div class="custom-dropdown" onclick="toggleDropdown()">
                <div id="dropdown-label">Seleccionar...</div>
                <div id="dropdown-menu" class="dropdown-content"></div>
            </div>

            <button id="btn-start" class="btn-primary main-action" disabled onclick="handleStart()">Comenzar</button>
        </div>
    </div>

    <!-- SCREEN: SCANNER (INVENTARIO) -->
    <div id="screen-scanner" class="screen">
        <div class="header-tab">
            <button onclick="showScreen('screen-setup')" class="btn-back">← Volver</button>
            <span id="meta-loc">Ubicación</span>
            <button onclick="showModal('modal-manual')" class="btn-icon">⌨️</button>
        </div>
        
        <div class="scanner-container-wrapper">
            <div id="qr-reader"></div>
        </div>

        <div class="scanner-controls">
            <!-- Selector de Cantidad a escanear -->
            <div class="qty-control">
                <label>Escanear Cantidad:</label>
                <input type="number" id="scan-qty" value="1" min="1">
            </div>
            
            <div id="counter">
                <span id="counter-num">0</span>
                <label>registrados</label>
            </div>
            <div id="last-scan-box">
                <div id="lsb-name">Esperando escaneo...</div>
                <div id="lsb-code">---</div>
            </div>
            <button onclick="endSession()" class="btn-danger">Finalizar Sesión</button>
        </div>
    </div>

    <!-- SCREEN: PEDIDO (LISTA) -->
    <div id="screen-pedido" class="screen">
        <div class="header-tab">
            <button onclick="showScreen('screen-setup')" class="btn-back">← Volver</button>
            <span id="pedido-title">Pedido</span>
            <button onclick="showModal('modal-manual')" class="btn-icon">⌨️</button>
        </div>

        <div class="progress-bar"><div id="pedido-progress-fill" class="fill"></div></div>

        <div id="pedido-list" class="pedido-list"></div>

        <div class="fab-container">
            <button onclick="openPedidoScanner()" class="btn-fab">📷 Escanear Pedido</button>
        </div>
    </div>

    <!-- SCREEN: SCANNER OVERLAY (PEDIDO) -->
    <div id="pedido-scanner-overlay" class="screen">
        <div class="scanner-overlay-header">
            <button onclick="closePedidoScanner()" class="btn-back-white">✕ Cerrar Cámara</button>
            <div id="pedido-scan-result">Apunta al código</div>
        </div>
        <div class="scanner-container-wrapper-overlay">
            <div id="qr-reader-pedido"></div>
        </div>
    </div>

    <!-- MODAL: ENTRADA MANUAL -->
    <div id="modal-manual" class="modal">
        <div class="modal-content">
            <h3>Entrada Manual</h3>
            <input type="text" id="manual-code" placeholder="Código">
            <input type="number" id="manual-qty" placeholder="Cantidad" value="1" min="1">
            <div class="modal-btns">
                <button onclick="hideModal('modal-manual')" class="btn-cancel">Cancelar</button>
                <button onclick="submitManual()" class="btn-primary">Registrar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
