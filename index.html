<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>H&P Portal</title>
  <!-- Usando html5-qrcode via JSDelivr para mayor estabilidad -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/html5-qrcode.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PANTALLA LOGIN -->
  <div id="screen-auth" class="screen">
    <div class="setup-wrap">
      <div class="auth-logo">H&P Portal</div>
      <div style="background:white; padding:30px; border-radius:32px; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
        <form id="form-auth" onsubmit="handleAuth(event)">
          <input type="text" id="auth-user" class="auth-input" placeholder="Usuario" required>
          <input type="password" id="auth-pass" class="auth-input" placeholder="Contraseña" required>
          <button type="submit" class="btn-main">Acceder</button>
        </form>
      </div>
    </div>
  </div>

  <!-- PANTALLA CONFIGURACIÓN -->
  <div id="screen-setup" class="screen">
    <div class="setup-wrap">
      <div class="user-card">
        <div class="user-name" id="display-name">Hola</div>
        <button onclick="logout()" style="background:#e5e5ea; border:none; width:44px; height:44px; border-radius:50%; font-weight:bold; cursor:pointer;">✕</button>
      </div>

      <div>
        <label class="section-label">Marcas</label>
        <div class="selector-group">
          <button class="btn-select brand-btn" data-brand="Huss" onclick="selectBrand(this)">
            <span>🦎</span> Hussongs
          </button>
          <button class="btn-select brand-btn" data-brand="Papas" onclick="selectBrand(this)">
            <span>🍟🍺</span> Papas & Beer
          </button>
        </div>
      </div>

      <div>
        <label class="section-label">Actividad</label>
        <div class="selector-group">
          <button class="btn-select mode-btn" data-mode="inventario" onclick="selectMode(this)">
            <span>📦</span> Inventario
          </button>
          <button class="btn-select mode-btn" data-mode="pedido" onclick="selectMode(this)">
            <span>📋</span> Pedidos
          </button>
        </div>
      </div>

      <div style="position:relative;">
        <label class="section-label">Tienda de entrega</label>
        <button class="drop-trigger" onclick="toggleDropdown()">
          <span id="dropdown-label">Seleccionar...</span>
          <span>▼</span>
        </button>
        <div class="drop-list" id="dropdown-menu"></div>
      </div>

      <button id="btn-start" class="btn-main" onclick="handleStart()" disabled>Comenzar →</button>
    </div>
  </div>

  <!-- PANTALLA INVENTARIO -->
  <div id="screen-scanner" class="screen">
    <div class="setup-wrap">
      <div class="user-name" id="meta-loc">Ubicación</div>
      <div class="scan-hero">
        <div><label class="section-label" style="margin:0;">Escaneados</label></div>
        <div class="scan-val" id="counter-num">0</div>
      </div>
      <!-- Contenedor del scanner con borde de feedback -->
      <div class="scanner-container-wrapper">
        <div id="qr-reader" style="width:100% !important;"></div>
      </div>
      <div style="background:white; padding:25px; border-radius:24px; box-shadow:0 10px 20px rgba(0,0,0,0.02);">
        <div id="lsb-name" style="font-weight:700;">Esperando...</div>
        <div id="lsb-code" style="color:#8e8e93; font-family:monospace; margin-top:5px;">----------</div>
      </div>
    </div>
    <div class="footer-nav">
      <button class="nav-btn btn-sec" onclick="showModal('modal-manual')">Manual</button>
      <button class="nav-btn btn-red" onclick="endSession()">Salir</button>
    </div>
  </div>

  <!-- PANTALLA PEDIDO -->
  <div id="screen-pedido" class="screen">
    <div class="setup-wrap">
      <div class="user-name" id="pedido-title">Pedido</div>
      <div style="height:8px; background:#e5e5ea; border-radius:10px; overflow:hidden;">
        <div id="pedido-progress-fill" style="height:100%; background:#007aff; width:0%; transition:0.5s;"></div>
      </div>
      <div class="pedido-list" id="pedido-list"></div>
    </div>
    <div class="footer-nav" style="gap:10px;">
      <button class="nav-btn btn-main" style="flex:2" onclick="openPedidoScanner()">📸 Escanear</button>
      <button class="nav-btn btn-main" style="background:#8e8e93" onclick="showModal('modal-manual')">⌨️</button>
      <button class="nav-btn btn-red" onclick="endSession()">Salir</button>
    </div>
    <div id="pedido-scanner-overlay" class="screen" style="z-index:2000; background:white; padding:0; display:none;">
      <div class="scanner-container-wrapper">
        <div id="qr-reader-pedido"></div>
      </div>
      <div id="pedido-scan-result" style="padding:40px; text-align:center; font-weight:800; font-size:24px;"></div>
      <button onclick="closePedidoScanner()" class="btn-main" style="border-radius:0; position:fixed; bottom:0;">Cerrar</button>
    </div>
  </div>

  <!-- MODAL MANUAL -->
  <div id="modal-manual" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(10px); z-index:5000; align-items:center; justify-content:center;">
    <div style="background:white; padding:40px; border-radius:32px; width:100%; max-width:360px; text-align:center;">
      <h3 style="margin-bottom:20px;">Manual</h3>
      <input type="number" id="manual-code" class="auth-input" style="text-align:center; font-size:24px;" placeholder="Código">
      <button class="btn-main" onclick="submitManual()">Registrar</button>
      <button onclick="hideModal('modal-manual')" style="background:none; border:none; color:#8e8e93; margin-top:20px; font-weight:700; cursor:pointer;">Cancelar</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
